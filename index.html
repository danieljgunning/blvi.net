<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>blvi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --border: rgba(255,255,255,0.15);
      --text: #f0ece4;
      --muted: rgba(240,236,228,0.45);
      --accent: #d4c4a8;
    }

    body {
      color: var(--text);
      font-family: 'IM Fell English', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem 6rem;
      position: relative;
      overflow-x: hidden;
    }

    /* video background */
    .bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      transform: translate(-50%, -50%) scale(1.5);
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
    }

    /* dark overlay so content stays readable */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 8, 0.62);
      z-index: -1;
    }

    /* logo */
    .logo-wrap {
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.2s forwards;
    }
    .logo-wrap img {
      width: 200px;
      height: auto;
      display: block;
    }

    /* platform links */
    .platforms {
      display: flex;
      gap: 2rem;
      margin-bottom: 4rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.4s forwards;
    }
    .platforms a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      text-decoration: none;
      font-family: 'IM Fell English', serif;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      transition: color 0.3s ease;
    }
    .platforms a:hover {
      color: var(--text);
    }
    .platforms img {
      width: 15px;
      height: 15px;
      object-fit: contain;
      filter: grayscale(1) brightness(0.6);
      transition: filter 0.3s ease;
    }
    .platforms a:hover img {
      filter: grayscale(0) brightness(1);
    }

    /* section label */
    .section-label {
      font-family: 'IM Fell English SC', serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 1.75rem;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.55s forwards;
    }

    /* releases — polaroid pinboard */
    .releases {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 640px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.7s forwards;
    }

    .release {
      text-decoration: none;
      color: #1a1a1a;
      display: block;
      position: absolute;
      overflow: visible;
      background: transparent;
    }

    /* only the photo and its white border rotate */
    .release-photo {
      position: relative;
      background: #f0ece4;
      padding: 10px 10px 38px 10px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.35);
      transition: transform 0.7s cubic-bezier(0.22,1,0.36,1), box-shadow 0.7s ease;
    }

    .release-photo img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      filter: grayscale(0.15) brightness(0.92) saturate(0.85);
      transition: filter 0.8s ease;
    }

    /* caption is OUTSIDE .release-photo — stays perfectly upright always */
    .release-caption {
      font-family: 'IM Fell English', serif;
      font-style: normal;
      font-size: 0.78rem;
      color: rgba(240,236,228,0.6);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.04em;
      transition: color 0.4s ease;
    }

    /* diagonal cascade: top-left → top-right (lower) → bottom-left (higher) → bottom-right */
    .release:nth-child(1) {
      width: 175px;
      top: 0px; left: 10px;
      z-index: 2;
      animation: appear 1s cubic-bezier(0.22,1,0.36,1) 0.8s both, float1 20s ease-in-out 2s infinite;
    }
    .release:nth-child(1) .release-photo { transform: rotate(-4.5deg); }

    .release:nth-child(2) {
      width: 162px;
      top: 80px; right: 10px;
      z-index: 3;
      animation: appear 1s cubic-bezier(0.22,1,0.36,1) 1.05s both, float2 24s ease-in-out 2s infinite;
    }
    .release:nth-child(2) .release-photo { transform: rotate(3.5deg); }

    .release:nth-child(3) {
      width: 182px;
      bottom: 80px; left: 40px;
      z-index: 1;
      animation: appear 1s cubic-bezier(0.22,1,0.36,1) 1.25s both, float3 22s ease-in-out 2s infinite;
    }
    .release:nth-child(3) .release-photo { transform: rotate(2deg); }

    .release:nth-child(4) {
      width: 170px;
      bottom: 0px; right: 30px;
      z-index: 2;
      animation: appear 1s cubic-bezier(0.22,1,0.36,1) 1.45s both, float4 26s ease-in-out 2s infinite;
    }
    .release:nth-child(4) .release-photo { transform: rotate(-3deg); }

    .release:hover { z-index: 10; }
    .release:hover .release-photo {
      transform: rotate(0deg) scale(1.05) !important;
      box-shadow: 0 22px 64px rgba(0,0,0,0.75), 0 4px 16px rgba(0,0,0,0.5);
    }
    .release:hover .release-photo img {
      filter: grayscale(0) brightness(1.02) saturate(1.05);
    }
    .release:hover .release-caption { color: rgba(240,236,228,0.95); }

    @keyframes float1 {
      0%,100% { transform: translate(0px,  0px); }
      30%      { transform: translate(6px, -10px); }
      60%      { transform: translate(-4px, 8px); }
      80%      { transform: translate(8px,  4px); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0px,  0px); }
      25%      { transform: translate(-8px, 8px); }
      55%      { transform: translate(6px, -6px); }
      80%      { transform: translate(-4px, 10px); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0px,  0px); }
      35%      { transform: translate(10px, -8px); }
      65%      { transform: translate(-6px, -4px); }
      85%      { transform: translate(4px,  8px); }
    }
    @keyframes float4 {
      0%,100% { transform: translate(0px,  0px); }
      20%      { transform: translate(-6px, -10px); }
      50%      { transform: translate(8px,  6px); }
      75%      { transform: translate(-10px, 4px); }
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(24px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 480px) {
      .releases { height: auto; display: grid; grid-template-columns: repeat(2,1fr); gap: 20px; padding: 1rem 0; }
      .release { position: relative; width: auto !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important; animation: appear 1s cubic-bezier(0.22,1,0.36,1) 0.8s both !important; }
      .release .release-photo { transform: none !important; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .logo-wrap img { width: 160px; }
      .releases { max-width: 100%; }
    }
  </style>
</head>
<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://archive.org/download/tyer_20260608/tyer.mp4" type="video/mp4">
  </video>
  <div class="bg-overlay"></div>

  <div class="logo-wrap">
    <img src="https://i.imgur.com/cGvk6Hr.png" alt="blvi">
  </div>

  <div class="platforms">
    <a href="https://open.spotify.com/artist/7HwF11ILY35YWfO8FTiOQg?si=qTFH5IwkQ3K8F3eNPmn7dA">
      <img src="https://i.imgur.com/ifasgKW.png" alt="">
      spotify
    </a>
    <a href="https://soundcloud.com/blvi">
      <img src="https://i.imgur.com/pFJR1qV.png" alt="">
      soundcloud
    </a>
  </div>

  <div class="releases">

    <a class="release" href="https://open.spotify.com/track/3jA1dfRX5lcQ22i3cM3g6c?si=8bc5d788a7424029">
      <div class="release-photo">
        <img src="https://imgur.com/zD9gcjl.jpg" alt="worth it">
      </div>
      <div class="release-caption">worth it</div>
    </a>

    <a class="release" href="https://open.spotify.com/track/6GHMWx90X0d1jZeVjFw7Gi?si=7415ecaeeeeb4227">
      <div class="release-photo">
        <img src="https://i.imgur.com/uFRRPDn.jpeg" alt="skin care">
      </div>
      <div class="release-caption">skin care</div>
    </a>

    <a class="release" href="https://open.spotify.com/track/7MR542qEmj4I85qlc19m9V?si=a68bc037c2b94db7">
      <div class="release-photo">
        <img src="https://i.imgur.com/DJJ8gy2.jpeg" alt="renshaw lane">
      </div>
      <div class="release-caption">renshaw lane</div>
    </a>

    <a class="release" href="https://open.spotify.com/track/3gbhm4GgJFXw5ZRQIkcSWV?si=4bb016b43c7f4b11">
      <div class="release-photo">
        <img src="https://i.imgur.com/3Ru1GJ3.jpeg" alt="world eater">
      </div>
      <div class="release-caption">world eater</div>
    </a>

  </div>

  <canvas id="leaves"></canvas>

  <script>
    const canvas = document.getElementById('leaves');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    canvas.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';

    const COUNT = 28;
    const leaves = [];

    function leafShape(ctx, w, h) {
      ctx.beginPath();
      ctx.moveTo(0, -h / 2);
      ctx.bezierCurveTo( w / 2, -h / 4,  w / 2,  h / 4,  0,  h / 2);
      ctx.bezierCurveTo(-w / 2,  h / 4, -w / 2, -h / 4,  0, -h / 2);
      ctx.closePath();
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < COUNT; i++) {
      leaves.push({
        x:       rand(0, window.innerWidth),
        y:       rand(-200, window.innerHeight),
        w:       rand(6, 14),
        h:       rand(10, 22),
        rot:     rand(0, Math.PI * 2),
        rotSpeed:rand(-0.008, 0.008),
        speedX:  rand(-0.25, 0.25),
        speedY:  rand(0.18, 0.55),
        sway:    rand(0.3, 0.9),
        swayOff: rand(0, Math.PI * 2),
        swaySpeed:rand(0.004, 0.012),
        alpha:   rand(0.06, 0.22),
        t:       rand(0, 1000),
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const l of leaves) {
        l.t      += 1;
        l.rot    += l.rotSpeed;
        l.x      += l.speedX + Math.sin(l.t * l.swaySpeed + l.swayOff) * l.sway * 0.4;
        l.y      += l.speedY;

        if (l.y > canvas.height + 30) {
          l.y = rand(-60, -10);
          l.x = rand(0, canvas.width);
        }

        ctx.save();
        ctx.translate(l.x, l.y);
        ctx.rotate(l.rot);
        ctx.globalAlpha = l.alpha;

        leafShape(ctx, l.w, l.h);
        ctx.fillStyle = '#c8b89a';
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, -l.h / 2);
        ctx.lineTo(0,  l.h / 2);
        ctx.strokeStyle = 'rgba(180,160,120,0.5)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        ctx.restore();
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>

</body>
</html>
